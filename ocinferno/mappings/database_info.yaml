# database_info.yaml
# OCI compartment ID has "tenancy" in it if its a tenant, it get stored in oci_compartments

databases:
  - database_name: service_info
    tables:
      # -----------------------------
      # Core org / compartment model
      # -----------------------------
      - table_name: resource_compartments
        columns:
          - compartment_id
          - defined_tags
          - description
          - freeform_tags
          - parent_compartment_id
          - inactive_status
          - is_accessible
          - lifecycle_state
          - name
          - time_created
          - service_namespace
        primary_keys:
          - compartment_id

      # -----------------------------
      # Identity Domains discovery
      # -----------------------------
      - table_name: identity_domains
        columns:
          - id
          - compartment_id
          - display_name
          - url
          - home_region_url
          - type
          - license_type
          - is_hidden_on_login
          - page
          - limit
          - name
          - sort_by
        primary_keys:
          - id

      # -----------------------------
      # Principals: Classic OCI IAM principals
      # -----------------------------
      - table_name: identity_users
        columns:
          - id
          - compartment_id
          - name
          - email
          - description
          - time_created
          - lifecycle_state
          - freeform_tags
          - defined_tags
        primary_keys:
          - id

      - table_name: identity_groups
        columns:
          - id
          - compartment_id
          - name
          - description
          - time_created
          - lifecycle_state
          - freeform_tags
          - defined_tags
        primary_keys:
          - id

      - table_name: identity_dynamic_groups
        columns:
          - compartment_id
          - defined_tags
          - description
          - freeform_tags
          - id
          - inactive_status
          - lifecycle_state
          - matching_rule
          - name
          - time_created
        primary_keys:
          - id

      # -----------------------------
      # Tagging (IAM)
      # -----------------------------
      - table_name: tag_namespaces
        columns:
          - id
          - compartment_id
          - name
          - description
          - is_retired
          - lifecycle_state
          - time_created
          - freeform_tags
          - defined_tags
        primary_keys:
          - id

      - table_name: tag_defaults
        columns:
          - id
          - compartment_id
          - tag_definition_id
          - tag_definition_name
          - tag_namespace_id
          - value
          - is_required
          - lifecycle_state
          - time_created
        primary_keys:
          - id

      - table_name: tag_definitions
        columns:
          - id
          - compartment_id
          - tag_namespace_id
          - tag_namespace_name
          - name
          - description
          - is_cost_tracking
          - is_retired
          - lifecycle_state
          - time_created
          - freeform_tags
          - defined_tags
        primary_keys:
          - id

      - table_name: identity_user_group_memberships
        columns:
          - id
          - membership_id
          - membership_ocid
          - user_id
          - group_id
          - user_name
          - group_name
          - domain_ocid
          - tenancy_ocid
          - compartment_id
          - inactive_status
        primary_keys:
          - id

      - table_name: identity_user_api_keys
        columns:
          - key_id
          - key_value
          - fingerprint
          - user_id
          - time_created
          - lifecycle_state
          - inactive_status
          - compartment_id
          - credname
          - private_key_path
          - public_key_path
          - created_at_utc
